version: "3.9"

# ── Bot Restaurante — docker-compose.yml ──────────────────────────────────────
# Produção: postgres + evolution-api + bot
# Proxy: Traefik externo (rede fintrack_default)
# Strapi roda fora do Docker (serviço systemd)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bot-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-botrestaurante}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-botrestaurante}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Evolution API ─────────────────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: bot-evolution
    restart: always
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: https://bot.guiafinanceiro.pro
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR
      LOG_COLOR: "false"
      LOG_BAILEYS: error
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-user}:${DB_PASSWORD:-pass}@postgres:5432/${DB_NAME:-botrestaurante}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: BotRestaurante
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`bot.guiafinanceiro.pro`) && PathPrefix(`/evolution`)"
      - "traefik.http.routers.evolution.entrypoints=websecure"
      - "traefik.http.routers.evolution.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.evolution-strip.stripprefix.prefixes=/evolution"
      - "traefik.http.routers.evolution.middlewares=evolution-strip"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"
      - "traefik.docker.network=fintrack_default"
    networks:
      - internal
      - traefik

  # ── Bot (Node.js) ─────────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-pass}@postgres:5432/${DB_NAME:-botrestaurante}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      STRAPI_URL: ${STRAPI_URL}
      STRAPI_TOKEN: ${STRAPI_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      BOT_PUBLIC_URL: https://bot.guiafinanceiro.pro
    volumes:
      - bot_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bot.rule=Host(`bot.guiafinanceiro.pro`)"
      - "traefik.http.routers.bot.entrypoints=websecure"
      - "traefik.http.routers.bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.bot.loadbalancer.server.port=3000"
      - "traefik.docker.network=fintrack_default"
    networks:
      - internal
      - traefik

volumes:
  postgres_data:
    driver: local
  evolution_data:
    driver: local
  bot_logs:
    driver: local

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: fintrack_default
