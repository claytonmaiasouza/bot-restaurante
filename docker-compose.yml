version: "3.9"

# ── Bot Restaurante — docker-compose.yml ──────────────────────────────────────
# Produção: postgres + evolution-api + bot + nginx
# Strapi roda fora do Docker (ver strapi/README.md)
#
# Uso:
#   cp .env.production.example .env
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bot-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-botrestaurante}
    ports:
      - "127.0.0.1:5432:5432"     # expõe apenas para localhost (não para a internet)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-botrestaurante}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Evolution API ─────────────────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: bot-evolution
    restart: always
    ports:
      - "127.0.0.1:8080:8080"     # interno — exposto via nginx em /evolution/
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${BOT_PUBLIC_URL:-http://localhost}/evolution
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR
      LOG_COLOR: "false"
      LOG_BAILEYS: error
      DEL_INSTANCE: "false"
      # Banco compartilhado com o bot (schema separado via client name)
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-user}:${DB_PASSWORD:-pass}@postgres:5432/${DB_NAME:-botrestaurante}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: BotRestaurante
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Bot (Node.js) ─────────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-app
    restart: always
    ports:
      - "127.0.0.1:3000:3000"     # interno — exposto via nginx em /api/ e /webhook/
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-pass}@postgres:5432/${DB_NAME:-botrestaurante}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      STRAPI_URL: ${STRAPI_URL}
      STRAPI_TOKEN: ${STRAPI_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      BOT_PUBLIC_URL: ${BOT_PUBLIC_URL}
    volumes:
      - bot_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - frontend

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      # Montagem para certificados Let's Encrypt (certbot)
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - bot
    networks:
      - backend
      - frontend

volumes:
  postgres_data:
    driver: local
  evolution_data:
    driver: local
  bot_logs:
    driver: local
  nginx_logs:
    driver: local
  letsencrypt:
    driver: local
  certbot_www:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
