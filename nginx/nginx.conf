# ── nginx/nginx.conf ──────────────────────────────────────────────────────────
# Proxy reverso para o Bot Restaurante SaaS
#
# Rotas:
#   /api/      → Bot Node.js      (porta 3000)
#   /cms/      → Strapi CMS       (porta 1337)
#   /evolution/→ Evolution API    (porta 8080)
#   /          → Strapi Admin UI  (fallback)
#
# Para ativar SSL com Let's Encrypt (certbot):
#   certbot --nginx -d seudominio.com
# O certbot edita este arquivo automaticamente.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Compressão
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Upstream services ──────────────────────────────────────────────────────
    upstream bot {
        server bot:3000;
        keepalive 32;
    }

    upstream strapi {
        server strapi:1337;
        keepalive 32;
    }

    upstream evolution {
        server evolution-api:8080;
        keepalive 32;
    }

    # ── Servidor HTTP (porta 80) ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # substitua pelo seu domínio em produção

        # ── /api/ → Bot Node.js ───────────────────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://bot;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";   # necessário para Socket.IO
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── /webhook/ → Bot (sem rewrite — slug precisa ser preservado) ───────
        location /webhook/ {
            proxy_pass http://bot;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
        }

        # ── /cms/ → Strapi CMS ────────────────────────────────────────────────
        location /cms/ {
            rewrite ^/cms/(.*)$ /$1 break;
            proxy_pass http://strapi;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
        }

        # ── /evolution/ → Evolution API ───────────────────────────────────────
        location /evolution/ {
            rewrite ^/evolution/(.*)$ /$1 break;
            proxy_pass http://evolution;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
        }

        # ── Healthcheck ───────────────────────────────────────────────────────
        location /health {
            proxy_pass http://bot/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Fallback → Strapi Admin UI ────────────────────────────────────────
        location / {
            proxy_pass http://strapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Bloco SSL (descomentado automaticamente pelo certbot) ─────────────────
    # server {
    #     listen 443 ssl;
    #     server_name seudominio.com www.seudominio.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/seudominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/seudominio.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Redireciona HTTP → HTTPS
    #     # (adicione no bloco porta 80: return 301 https://$host$request_uri;)
    #
    #     # Repita os blocos location acima aqui
    # }
}
